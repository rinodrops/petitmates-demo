name: Build Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Install Rust stable + Windows target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-win-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-win-

      - name: Build and package
        run: make windows-exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PetitMatesDemo-windows
          path: build/PetitMatesDemo-v*-windows-x86_64.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/PetitMatesDemo-v*-windows-x86_64.zip
